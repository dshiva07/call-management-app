<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .call-list {
            display: grid;
            gap: 20px;
        }

        .call-card {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .call-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .call-card.completed {
            border-left-color: #28a745;
        }

        .call-card.pending {
            border-left-color: #ffc107;
        }

        .call-card.no-answer {
            border-left-color: #dc3545;
        }

        .call-card.rescheduled {
            border-left-color: #17a2b8;
        }

        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .call-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-no-answer {
            background: #f8d7da;
            color: #721c24;
        }

        .status-rescheduled {
            background: #d1ecf1;
            color: #0c5460;
        }

        .call-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .detail-item {
            color: #666;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
        }

        .call-notes {
            background: white;
            padding: 12px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            margin-bottom: 15px;
            font-style: italic;
            color: #555;
        }

        .call-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card.pending {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
        }

        .stat-card.completed {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .stat-card.no-answer {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1em;
            opacity: 0.9;
        }

        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .call-details {
                grid-template-columns: 1fr;
            }

            .call-header {
                flex-direction: column;
            }

            .tabs {
                overflow-x: auto;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .export-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 Call Management System</h1>
            <p>Track calls, manage follow-ups, and maintain professional relationships</p>
        </div>

        <div class="content">
            <!-- Alert Messages -->
            <div id="alertContainer"></div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="add-call">Add Call</button>
                <button class="tab-btn" data-tab="view-calls">View Calls</button>
                <button class="tab-btn" data-tab="followups">Follow-ups</button>
                <button class="tab-btn" data-tab="stats">Statistics</button>
            </div>

            <!-- Tab 1: Add Call -->
            <div class="tab-content active" id="add-call">
                <div class="form-section">
                    <div class="form-title">Add New Call Record</div>
                    <form id="callForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="contactName">Contact Name *</label>
                                <input type="text" id="contactName" required placeholder="Enter person's name">
                            </div>
                            <div class="form-group">
                                <label for="contactPhone">Phone Number *</label>
                                <input type="tel" id="contactPhone" required placeholder="Enter phone number">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="callDate">Call Date *</label>
                                <input type="datetime-local" id="callDate" required>
                            </div>
                            <div class="form-group">
                                <label for="callStatus">Call Status *</label>
                                <select id="callStatus" required>
                                    <option value="">Select Status</option>
                                    <option value="pending">Pending</option>
                                    <option value="completed">Completed</option>
                                    <option value="no-answer">No Answer</option>
                                    <option value="rescheduled">Rescheduled</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="contactEmail">Email</label>
                                <input type="email" id="contactEmail" placeholder="Enter email address">
                            </div>
                            <div class="form-group">
                                <label for="company">Company/Organization</label>
                                <input type="text" id="company" placeholder="Enter company name">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="callNotes">Call Notes</label>
                            <textarea id="callNotes" placeholder="Add details about the call..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="followupDate">Follow-up Date (if required)</label>
                            <input type="datetime-local" id="followupDate">
                        </div>

                        <div class="form-group">
                            <label for="followupNotes">Follow-up Notes</label>
                            <textarea id="followupNotes" placeholder="What needs to be done in the follow-up..."></textarea>
                        </div>

                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn btn-primary">Add Call Record</button>
                            <button type="reset" class="btn btn-secondary">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tab 2: View Calls -->
            <div class="tab-content" id="view-calls">
                <div class="filter-section">
                    <div class="form-group">
                        <label for="filterStatus">Filter by Status</label>
                        <select id="filterStatus">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                            <option value="no-answer">No Answer</option>
                            <option value="rescheduled">Rescheduled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="searchContact">Search Contact</label>
                        <input type="text" id="searchContact" placeholder="Search by name or phone...">
                    </div>
                    <div class="form-group">
                        <label for="sortBy">Sort By</label>
                        <select id="sortBy">
                            <option value="date-desc">Latest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                        </select>
                    </div>
                </div>

                <div id="callsContainer" class="call-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No calls recorded yet. Add a call to get started!</p>
                    </div>
                </div>
            </div>

            <!-- Tab 3: Follow-ups -->
            <div class="tab-content" id="followups">
                <div class="filter-section">
                    <div class="form-group">
                        <label for="followupFilter">Filter By</label>
                        <select id="followupFilter">
                            <option value="all">All Follow-ups</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                            <option value="overdue">Overdue</option>
                        </select>
                    </div>
                </div>

                <div id="followupContainer" class="call-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <p>No follow-ups scheduled yet!</p>
                    </div>
                </div>
            </div>

            <!-- Tab 4: Statistics -->
            <div class="tab-content" id="stats">
                <div id="statsContainer">
                    <div class="empty-state">
                        <p>No data to display yet.</p>
                    </div>
                </div>
                <button id="exportBtn" class="btn btn-primary export-btn">📊 Export to CSV</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">Edit Call Record</div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editContactName">Contact Name</label>
                    <input type="text" id="editContactName" required>
                </div>
                <div class="form-group">
                    <label for="editContactPhone">Phone Number</label>
                    <input type="tel" id="editContactPhone" required>
                </div>
                <div class="form-group">
                    <label for="editCallStatus">Call Status</label>
                    <select id="editCallStatus" required>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="no-answer">No Answer</option>
                        <option value="rescheduled">Rescheduled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editCallNotes">Call Notes</label>
                    <textarea id="editCallNotes"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data Management
        class CallManager {
            constructor() {
                this.calls = this.loadFromLocalStorage();
            }

            loadFromLocalStorage() {
                const data = localStorage.getItem('callRecords');
                return data ? JSON.parse(data) : [];
            }

            saveToLocalStorage() {
                localStorage.setItem('callRecords', JSON.stringify(this.calls));
            }

            addCall(callData) {
                const newCall = {
                    id: Date.now(),
                    ...callData,
                    createdAt: new Date().toISOString()
                };
                this.calls.unshift(newCall);
                this.saveToLocalStorage();
                return newCall;
            }

            updateCall(id, updatedData) {
                const index = this.calls.findIndex(call => call.id === id);
                if (index !== -1) {
                    this.calls[index] = { ...this.calls[index], ...updatedData, updatedAt: new Date().toISOString() };
                    this.saveToLocalStorage();
                    return this.calls[index];
                }
                return null;
            }

            deleteCall(id) {
                this.calls = this.calls.filter(call => call.id !== id);
                this.saveToLocalStorage();
            }

            getCall(id) {
                return this.calls.find(call => call.id === id);
            }

            getAllCalls() {
                return this.calls;
            }

            getCalls(filter = {}) {
                let filtered = this.calls;

                if (filter.status) {
                    filtered = filtered.filter(call => call.callStatus === filter.status);
                }

                if (filter.search) {
                    const search = filter.search.toLowerCase();
                    filtered = filtered.filter(call =>
                        call.contactName.toLowerCase().includes(search) ||
                        call.contactPhone.includes(search)
                    );
                }

                if (filter.sort) {
                    filtered.sort((a, b) => {
                        switch (filter.sort) {
                            case 'date-asc':
                                return new Date(a.callDate) - new Date(b.callDate);
                            case 'date-desc':
                                return new Date(b.callDate) - new Date(a.callDate);
                            case 'name-asc':
                                return a.contactName.localeCompare(b.contactName);
                            case 'name-desc':
                                return b.contactName.localeCompare(a.contactName);
                            default:
                                return 0;
                        }
                    });
                }

                return filtered;
            }

            getFollowups(filter = 'all') {
                const followups = this.calls.filter(call => call.followupDate);

                if (filter === 'pending') {
                    return followups.filter(call => call.followupStatus !== 'completed');
                } else if (filter === 'completed') {
                    return followups.filter(call => call.followupStatus === 'completed');
                } else if (filter === 'overdue') {
                    const now = new Date();
                    return followups.filter(call =>
                        new Date(call.followupDate) < now && call.followupStatus !== 'completed'
                    );
                }

                return followups;
            }

            getStats() {
                const stats = {
                    total: this.calls.length,
                    pending: this.calls.filter(c => c.callStatus === 'pending').length,
                    completed: this.calls.filter(c => c.callStatus === 'completed').length,
                    noAnswer: this.calls.filter(c => c.callStatus === 'no-answer').length,
                    rescheduled: this.calls.filter(c => c.callStatus === 'rescheduled').length,
                    followupsPending: this.calls.filter(c => c.followupDate && c.followupStatus !== 'completed').length
                };
                return stats;
            }
        }

        const callManager = new CallManager();
        let currentEditingId = null;

        // UI Functions
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function getStatusBadgeClass(status) {
            return `status-${status}`;
        }

        function renderCallCard(call) {
            const isOverdue = call.followupDate && new Date(call.followupDate) < new Date() && call.followupStatus !== 'completed';
            const overdueIndicator = isOverdue ? '<span style="color: #dc3545; font-weight: bold;">⚠️ OVERDUE</span>' : '';

            return `
                <div class="call-card ${call.callStatus}">
                    <div class="call-header">
                        <div class="call-name">${call.contactName}</div>
                        <span class="status-badge ${getStatusBadgeClass(call.callStatus)}">${call.callStatus}</span>
                    </div>
                    <div class="call-details">
                        <div class="detail-item">
                            <span class="detail-label">📞 Phone:</span> ${call.contactPhone}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">📅 Date:</span> ${formatDate(call.callDate)}
                        </div>
                        ${call.contactEmail ? `<div class="detail-item"><span class="detail-label">📧 Email:</span> ${call.contactEmail}</div>` : ''}
                        ${call.company ? `<div class="detail-item"><span class="detail-label">🏢 Company:</span> ${call.company}</div>` : ''}
                    </div>
                    ${call.callNotes ? `<div class="call-notes">${call.callNotes}</div>` : ''}
                    ${call.followupDate ? `
                        <div class="call-details" style="background: #f0f0f0; padding: 10px; border-radius: 5px; margin: 10px 0;">
                            <div class="detail-item">
                                <span class="detail-label">📋 Follow-up:</span> ${formatDate(call.followupDate)} ${overdueIndicator}
                            </div>
                            ${call.followupNotes ? `<div class="detail-item"><span class="detail-label">Notes:</span> ${call.followupNotes}</div>` : ''}
                        </div>
                    ` : ''}
                    <div class="call-actions">
                        <button class="btn btn-secondary btn-small" onclick="openEditModal(${call.id})">Edit</button>
                        <button class="btn btn-success btn-small" onclick="markFollowupComplete(${call.id})">✓ Followup Done</button>
                        <button class="btn btn-danger btn-small" onclick="deleteCall(${call.id})">Delete</button>
                    </div>
                </div>
            `;
        }

        function renderCalls() {
            const status = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchContact').value;
            const sort = document.getElementById('sortBy').value;

            const calls = callManager.getCalls({
                status: status || undefined,
                search: search || undefined,
                sort: sort || 'date-desc'
            });

            const container = document.getElementById('callsContainer');
            if (calls.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No calls found.</p>
                    </div>
                `;
            } else {
                container.innerHTML = calls.map(call => renderCallCard(call)).join('');
            }
        }

        function renderFollowups() {
            const filter = document.getElementById('followupFilter').value || 'all';
            const followups = callManager.getFollowups(filter);

            const container = document.getElementById('followupContainer');
            if (followups.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <p>No follow-ups found.</p>
                    </div>
                `;
            } else {
                container.innerHTML = followups.map(call => renderCallCard(call)).join('');
            }
        }

        function renderStats() {
            const stats = callManager.getStats();
            const container = document.getElementById('statsContainer');

            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.total}</div>
                        <div class="stat-label">Total Calls</div>
                    </div>
                    <div class="stat-card pending">
                        <div class="stat-number">${stats.pending}</div>
                        <div class="stat-label">Pending Calls</div>
                    </div>
                    <div class="stat-card completed">
                        <div class="stat-number">${stats.completed}</div>
                        <div class="stat-label">Completed Calls</div>
                    </div>
                    <div class="stat-card no-answer">
                        <div class="stat-number">${stats.noAnswer}</div>
                        <div class="stat-label">No Answer</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #17a2b8 0%, #20c997 100%);">
                        <div class="stat-number">${stats.rescheduled}</div>
                        <div class="stat-label">Rescheduled</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);">
                        <div class="stat-number">${stats.followupsPending}</div>
                        <div class="stat-label">Pending Follow-ups</div>
                    </div>
                </div>
            `;
        }

        function openEditModal(id) {
            const call = callManager.getCall(id);
            if (call) {
                currentEditingId = id;
                document.getElementById('editContactName').value = call.contactName;
                document.getElementById('editContactPhone').value = call.contactPhone;
                document.getElementById('editCallStatus').value = call.callStatus;
                document.getElementById('editCallNotes').value = call.callNotes || '';
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditingId = null;
        }

        function deleteCall(id) {
            if (confirm('Are you sure you want to delete this call record?')) {
                callManager.deleteCall(id);
                showAlert('Call record deleted successfully!', 'success');
                renderCalls();
                renderFollowups();
                renderStats();
            }
        }

        function markFollowupComplete(id) {
            const call = callManager.getCall(id);
            if (call && call.followupDate) {
                callManager.updateCall(id, { followupStatus: 'completed' });
                showAlert('Follow-up marked as complete!', 'success');
                renderFollowups();
                renderStats();
            }
        }

        function exportToCSV() {
            const calls = callManager.getAllCalls();
            if (calls.length === 0) {
                alert('No data to export!');
                return;
            }

            let csv = 'Contact Name,Phone,Email,Company,Call Date,Call Status,Notes,Follow-up Date,Follow-up Notes,Follow-up Status\n';

            calls.forEach(call => {
                const row = [
                    `"${call.contactName}"`,
                    `"${call.contactPhone}"`,
                    `"${call.contactEmail || ''}"`,
                    `"${call.company || ''}"`,
                    `"${formatDate(call.callDate)}"`,
                    `"${call.callStatus}"`,
                    `"${(call.callNotes || '').replace(/"/g, '""')}"`,
                    `"${call.followupDate ? formatDate(call.followupDate) : ''}"`,
                    `"${(call.followupNotes || '').replace(/"/g, '""')}"`,
                    `"${call.followupStatus || 'pending'}"`
                ];
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `call_records_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            showAlert('Data exported successfully!', 'success');
        }

        // Event Listeners
        document.getElementById('callForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const callData = {
                contactName: document.getElementById('contactName').value,
                contactPhone: document.getElementById('contactPhone').value,
                callDate: document.getElementById('callDate').value,
                callStatus: document.getElementById('callStatus').value,
                contactEmail: document.getElementById('contactEmail').value || '',
                company: document.getElementById('company').value || '',
                callNotes: document.getElementById('callNotes').value || '',
                followupDate: document.getElementById('followupDate').value || '',
                followupNotes: document.getElementById('followupNotes').value || '',
                followupStatus: 'pending'
            };

            callManager.addCall(callData);
            showAlert('Call record added successfully!', 'success');
            document.getElementById('callForm').reset();
            
            // Set today's date as default for next entry
            const now = new Date();
            document.getElementById('callDate').value = now.toISOString().slice(0, 16);

            renderCalls();
            renderFollowups();
            renderStats();
        });

        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const updatedData = {
                contactName: document.getElementById('editContactName').value,
                contactPhone: document.getElementById('editContactPhone').value,
                callStatus: document.getElementById('editCallStatus').value,
                callNotes: document.getElementById('editCallNotes').value
            };

            callManager.updateCall(currentEditingId, updatedData);
            showAlert('Call record updated successfully!', 'success');
            closeEditModal();
            renderCalls();
            renderFollowups();
            renderStats();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                e.target.classList.add('active');
                const tabId = e.target.dataset.tab;
                document.getElementById(tabId).classList.add('active');

                // Refresh data when switching to view
                if (tabId === 'view-calls') {
                    renderCalls();
                } else if (tabId === 'followups') {
                    renderFollowups();
                } else if (tabId === 'stats') {
                    renderStats();
                }
            });
        });

        document.getElementById('filterStatus').addEventListener('change', renderCalls);
        document.getElementById('searchContact').addEventListener('input', renderCalls);
        document.getElementById('sortBy').addEventListener('change', renderCalls);
        document.getElementById('followupFilter').addEventListener('change', renderFollowups);
        document.getElementById('exportBtn').addEventListener('click', exportToCSV);

        // Modal close on outside click
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // Initialize
        const now = new Date();
        document.getElementById('callDate').value = now.toISOString().slice(0, 16);
        renderStats();

        // Refresh stats every minute
        setInterval(() => {
            const currentTab = document.querySelector('.tab-content.active').id;
            if (currentTab === 'stats') {
                renderStats();
            }
        }, 60000);
    </script>
</body>
</html>
