<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Tracker Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="datetime-local"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .calls-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
        }

        .calls-list {
            display: grid;
            gap: 15px;
        }

        .call-card {
            background: #f9f9f9;
            border-left: 5px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .call-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .call-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .call-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-rescheduled {
            background: #cce5ff;
            color: #004085;
        }

        .call-details {
            margin: 10px 0;
            font-size: 0.95em;
            color: #666;
        }

        .call-detail-item {
            margin: 5px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .call-detail-label {
            font-weight: 600;
            color: #555;
            min-width: 100px;
        }

        .call-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5568d3;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-reschedule {
            background: #ffc107;
            color: #333;
        }

        .btn-reschedule:hover {
            background: #e0a800;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .modal-close {
            float: right;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            margin-top: -40px;
            margin-right: -10px;
        }

        .modal-close:hover {
            color: #333;
        }

        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

        .btn-export {
            background: #17a2b8;
            color: white;
            width: 100%;
        }

        .btn-export:hover {
            background: #138496;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .call-actions {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }
        }

        .search-box {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 1em;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 Call Tracker</h1>
            <p>Manage and track multiple calls throughout your day</p>
        </header>

        <div class="main-content">
            <!-- Add Call Form -->
            <div class="card form-section">
                <h2>Add New Call</h2>
                <form id="callForm">
                    <div class="form-group">
                        <label for="personName">Person Name *</label>
                        <input type="text" id="personName" required placeholder="Enter name">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="123-456-7890">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="callDate">Call Date *</label>
                        <input type="date" id="callDate" required>
                    </div>

                    <div class="form-group">
                        <label for="callTime">Call Time *</label>
                        <input type="time" id="callTime" required>
                    </div>

                    <div class="form-group">
                        <label for="purpose">Call Purpose *</label>
                        <textarea id="purpose" required placeholder="Describe the purpose of the call..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="notes">Additional Notes</label>
                        <textarea id="notes" placeholder="Add any additional notes..."></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-add">Add Call</button>
                        <button type="reset" class="btn-clear">Clear</button>
                    </div>
                </form>

                <div class="export-section">
                    <button class="btn-export" onclick="exportToCSV()">📥 Export to CSV</button>
                </div>
            </div>

            <!-- Calls List -->
            <div class="card calls-section">
                <h2>Today's Calls</h2>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalCalls">0</div>
                        <div class="stat-label">Total Calls</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="completedCalls">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="pendingCalls">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="rescheduledCalls">0</div>
                        <div class="stat-label">Rescheduled</div>
                    </div>
                </div>

                <input type="text" id="searchBox" class="search-box" placeholder="Search calls by name, phone, or purpose...">

                <div class="filter-section">
                    <button class="filter-btn active" onclick="filterCalls('all')">All</button>
                    <button class="filter-btn" onclick="filterCalls('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterCalls('completed')">Completed</button>
                    <button class="filter-btn" onclick="filterCalls('rescheduled')">Rescheduled</button>
                </div>

                <div id="callsList" class="calls-list"></div>
            </div>
        </div>
    </div>

    <!-- Reschedule Modal -->
    <div id="rescheduleModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeRescheduleModal()">&times;</span>
            <div class="modal-header">Reschedule Call</div>
            <form id="rescheduleForm">
                <div class="form-group">
                    <label for="rescheduleDate">New Date *</label>
                    <input type="date" id="rescheduleDate" required>
                </div>
                <div class="form-group">
                    <label for="rescheduleTime">New Time *</label>
                    <input type="time" id="rescheduleTime" required>
                </div>
                <div class="form-group">
                    <label for="rescheduleReason">Reason for Rescheduling</label>
                    <textarea id="rescheduleReason" placeholder="Why are you rescheduling this call?"></textarea>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-add">Reschedule</button>
                    <button type="button" class="btn-clear" onclick="closeRescheduleModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">Edit Call</div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editPersonName">Person Name *</label>
                    <input type="text" id="editPersonName" required>
                </div>
                <div class="form-group">
                    <label for="editPhone">Phone Number</label>
                    <input type="tel" id="editPhone">
                </div>
                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail">
                </div>
                <div class="form-group">
                    <label for="editCallDate">Call Date *</label>
                    <input type="date" id="editCallDate" required>
                </div>
                <div class="form-group">
                    <label for="editCallTime">Call Time *</label>
                    <input type="time" id="editCallTime" required>
                </div>
                <div class="form-group">
                    <label for="editPurpose">Call Purpose *</label>
                    <textarea id="editPurpose" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editNotes">Additional Notes</label>
                    <textarea id="editNotes"></textarea>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-add">Update Call</button>
                    <button type="button" class="btn-clear" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let calls = [];
        let currentFilter = 'all';
        let currentEditId = null;
        let currentRescheduleId = null;

        // Load data from localStorage on page load
        window.addEventListener('load', () => {
            loadFromLocalStorage();
            renderCalls();
            setTodayDate();
        });

        // Set today's date as default
        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('callDate').value = today;
            document.getElementById('rescheduleDate').value = today;
            document.getElementById('editCallDate').value = today;
        }

        // Add new call
        document.getElementById('callForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const newCall = {
                id: Date.now(),
                name: document.getElementById('personName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                date: document.getElementById('callDate').value,
                time: document.getElementById('callTime').value,
                purpose: document.getElementById('purpose').value,
                notes: document.getElementById('notes').value,
                status: 'pending',
                createdAt: new Date().toISOString(),
                rescheduledFrom: null,
                rescheduledReason: null
            };

            calls.push(newCall);
            saveToLocalStorage();
            renderCalls();
            document.getElementById('callForm').reset();
            setTodayDate();
        });

        // Reschedule form submit
        document.getElementById('rescheduleForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const callToReschedule = calls.find(c => c.id === currentRescheduleId);
            if (callToReschedule) {
                const newCall = {
                    id: Date.now(),
                    name: callToReschedule.name,
                    phone: callToReschedule.phone,
                    email: callToReschedule.email,
                    date: document.getElementById('rescheduleDate').value,
                    time: document.getElementById('rescheduleTime').value,
                    purpose: callToReschedule.purpose,
                    notes: callToReschedule.notes,
                    status: 'rescheduled',
                    createdAt: callToReschedule.createdAt,
                    rescheduledFrom: currentRescheduleId,
                    rescheduledReason: document.getElementById('rescheduleReason').value
                };

                callToReschedule.status = 'rescheduled';
                calls.push(newCall);
                saveToLocalStorage();
                renderCalls();
                closeRescheduleModal();
            }
        });

        // Edit form submit
        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const callToEdit = calls.find(c => c.id === currentEditId);
            if (callToEdit) {
                callToEdit.name = document.getElementById('editPersonName').value;
                callToEdit.phone = document.getElementById('editPhone').value;
                callToEdit.email = document.getElementById('editEmail').value;
                callToEdit.date = document.getElementById('editCallDate').value;
                callToEdit.time = document.getElementById('editCallTime').value;
                callToEdit.purpose = document.getElementById('editPurpose').value;
                callToEdit.notes = document.getElementById('editNotes').value;

                saveToLocalStorage();
                renderCalls();
                closeEditModal();
            }
        });

        // Mark call as completed
        function completeCall(id) {
            const call = calls.find(c => c.id === id);
            if (call) {
                call.status = 'completed';
                saveToLocalStorage();
                renderCalls();
            }
        }

        // Delete call
        function deleteCall(id) {
            if (confirm('Are you sure you want to delete this call?')) {
                calls = calls.filter(c => c.id !== id);
                saveToLocalStorage();
                renderCalls();
            }
        }

        // Open reschedule modal
        function openRescheduleModal(id) {
            currentRescheduleId = id;
            document.getElementById('rescheduleModal').classList.add('active');
            setTodayDate();
        }

        // Close reschedule modal
        function closeRescheduleModal() {
            document.getElementById('rescheduleModal').classList.remove('active');
            document.getElementById('rescheduleForm').reset();
            currentRescheduleId = null;
        }

        // Open edit modal
        function openEditModal(id) {
            currentEditId = id;
            const call = calls.find(c => c.id === id);
            if (call) {
                document.getElementById('editPersonName').value = call.name;
                document.getElementById('editPhone').value = call.phone;
                document.getElementById('editEmail').value = call.email;
                document.getElementById('editCallDate').value = call.date;
                document.getElementById('editCallTime').value = call.time;
                document.getElementById('editPurpose').value = call.purpose;
                document.getElementById('editNotes').value = call.notes;
                document.getElementById('editModal').classList.add('active');
            }
        }

        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editForm').reset();
            currentEditId = null;
        }

        // Filter calls
        function filterCalls(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCalls();
        }

        // Search calls
        document.getElementById('searchBox').addEventListener('input', renderCalls);

        // Render calls list
        function renderCalls() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            let filteredCalls = calls;

            // Apply status filter
            if (currentFilter !== 'all') {
                filteredCalls = filteredCalls.filter(c => c.status === currentFilter);
            }

            // Apply search filter
            if (searchTerm) {
                filteredCalls = filteredCalls.filter(c =>
                    c.name.toLowerCase().includes(searchTerm) ||
                    c.phone.toLowerCase().includes(searchTerm) ||
                    c.purpose.toLowerCase().includes(searchTerm)
                );
            }

            // Sort by date and time
            filteredCalls.sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateA - dateB;
            });

            const callsList = document.getElementById('callsList');

            if (filteredCalls.length === 0) {
                callsList.innerHTML = '<div class="no-results">No calls found. Add a new call to get started!</div>';
            } else {
                callsList.innerHTML = filteredCalls.map(call => `
                    <div class="call-card">
                        <div class="call-header">
                            <div class="call-name">${escapeHtml(call.name)}</div>
                            <span class="call-status status-${call.status}">${call.status.toUpperCase()}</span>
                        </div>
                        <div class="call-details">
                            ${call.phone ? `<div class="call-detail-item"><span class="call-detail-label">📱 Phone:</span>${escapeHtml(call.phone)}</div>` : ''}
                            ${call.email ? `<div class="call-detail-item"><span class="call-detail-label">📧 Email:</span>${escapeHtml(call.email)}</div>` : ''}
                            <div class="call-detail-item"><span class="call-detail-label">📅 Date/Time:</span>${formatDate(call.date)} at ${call.time}</div>
                            <div class="call-detail-item"><span class="call-detail-label">📝 Purpose:</span>${escapeHtml(call.purpose)}</div>
                            ${call.notes ? `<div class="call-detail-item"><span class="call-detail-label">📌 Notes:</span>${escapeHtml(call.notes)}</div>` : ''}
                            ${call.rescheduledReason ? `<div class="call-detail-item"><span class="call-detail-label">🔄 Reason:</span>${escapeHtml(call.rescheduledReason)}</div>` : ''}
                        </div>
                        <div class="call-actions">
                            <button class="btn-small btn-edit" onclick="openEditModal(${call.id})">✏️ Edit</button>
                            ${call.status !== 'completed' ? `<button class="btn-small btn-complete" onclick="completeCall(${call.id})">✅ Complete</button>` : ''}
                            ${call.status !== 'completed' && call.status !== 'rescheduled' ? `<button class="btn-small btn-reschedule" onclick="openRescheduleModal(${call.id})">🔄 Reschedule</button>` : ''}
                            <button class="btn-small btn-delete" onclick="deleteCall(${call.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            updateStats();
        }

        // Update statistics
        function updateStats() {
            const total = calls.length;
            const completed = calls.filter(c => c.status === 'completed').length;
            const pending = calls.filter(c => c.status === 'pending').length;
            const rescheduled = calls.filter(c => c.status === 'rescheduled').length;

            document.getElementById('totalCalls').textContent = total;
            document.getElementById('completedCalls').textContent = completed;
            document.getElementById('pendingCalls').textContent = pending;
            document.getElementById('rescheduledCalls').textContent = rescheduled;
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('callTrackerData', JSON.stringify(calls));
        }

        // Load from localStorage
        function loadFromLocalStorage() {
            const data = localStorage.getItem('callTrackerData');
            if (data) {
                calls = JSON.parse(data);
            }
        }

        // Export to CSV
        function exportToCSV() {
            if (calls.length === 0) {
                alert('No calls to export!');
                return;
            }

            let csv = 'Name,Phone,Email,Date,Time,Purpose,Notes,Status,Created At\n';
            calls.forEach(call => {
                const row = [
                    `"${call.name.replace(/"/g, '""')}"`,
                    `"${call.phone.replace(/"/g, '""')}"`,
                    `"${call.email.replace(/"/g, '""')}"`,
                    call.date,
                    call.time,
                    `"${call.purpose.replace(/"/g, '""')}"`,
                    `"${call.notes.replace(/"/g, '""')}"`,
                    call.status,
                    new Date(call.createdAt).toLocaleString()
                ];
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `call-tracker-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Close modals when clicking outside
        window.addEventListener('click', (e) => {
            const rescheduleModal = document.getElementById('rescheduleModal');
            const editModal = document.getElementById('editModal');

            if (e.target === rescheduleModal) {
                closeRescheduleModal();
            }
            if (e.target === editModal) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
